{% extends "base.html" %}

{% block title %}
Alquileres
{% endblock %}

{% block content %}

<h1>Alquileres</h1>

<ul>
    {% for r in rentals %}
    <li>
        {{ r.user }} - {{ r.game }} - {{ r.rental_type }}
    </li>
    {% empty %}
    <li>No hay alquileres cargados.</li>
    {% endfor %}
</ul>

{% endblock %}
